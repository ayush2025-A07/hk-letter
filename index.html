<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message for Rui! 🎀</title>
    <style>
        /* --- Google Fonts --- */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@500;700&display=swap');

        /* --- Custom Properties / Palette --- */
        :root {
            --hk-pink: #FFB7CE;
            --hk-light-pink: #FFE5EC;
            --hk-dark-pink: #FF85A2;
            --hk-lavender: #E8DFF5;
            --hk-blue: #F0F8FF;
            --hk-white: #FFFFFF;
            --hk-text: #5D4E60;
            --font-display: 'Fredoka', sans-serif;
            --font-body: 'Quicksand', sans-serif;
        }

        /* --- Global Resets & Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, var(--hk-light-pink), var(--hk-lavender), var(--hk-blue));
            color: var(--hk-text);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* --- Background Effects --- */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- Main Container --- */
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Glowing Title --- */
        .title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            color: var(--hk-white);
            text-shadow: 0 0 10px var(--hk-dark-pink), 0 0 20px var(--hk-pink);
            text-align: center;
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite alternate, float 4s ease-in-out infinite;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px var(--hk-pink), 0 0 20px var(--hk-pink); }
            to { text-shadow: 0 0 15px var(--hk-dark-pink), 0 0 30px var(--hk-dark-pink); }
        }

        /* --- CSS Hello Kitty Icon/Avatar --- */
        .hk-avatar {
            width: 120px;
            height: 90px;
            background: var(--hk-white);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            border: 4px solid var(--hk-text);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: -20px;
            z-index: 15;
            animation: float 4s ease-in-out infinite;
        }

        /* Kitty Ears */
        .hk-avatar::before, .hk-avatar::after {
            content: '';
            position: absolute;
            top: -15px;
            width: 35px;
            height: 35px;
            background: var(--hk-white);
            border: 4px solid var(--hk-text);
            border-radius: 10px;
        }
        .hk-avatar::before { left: -5px; transform: rotate(-15deg); border-bottom: none; border-right: none;}
        .hk-avatar::after { right: -5px; transform: rotate(15deg); border-bottom: none; border-left: none;}

        /* Kitty Eyes & Nose */
        .hk-eyes {
            position: absolute;
            top: 40px;
            width: 10px;
            height: 14px;
            background: var(--hk-text);
            border-radius: 50%;
        }
        .hk-eyes.left { left: 30px; }
        .hk-eyes.right { right: 30px; }
        .hk-nose {
            position: absolute;
            top: 48px;
            left: 53px;
            width: 14px;
            height: 10px;
            background: #FCE100;
            border: 3px solid var(--hk-text);
            border-radius: 50%;
        }

        /* Kitty Bow */
        .hk-bow {
            position: absolute;
            top: -5px;
            left: 10px;
            width: 22px;
            height: 22px;
            background: var(--hk-dark-pink);
            border: 3px solid var(--hk-text);
            border-radius: 50%;
            z-index: 2;
        }
        .hk-bow::before, .hk-bow::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--hk-dark-pink);
            border: 3px solid var(--hk-text);
            border-radius: 50%;
            top: -2px;
        }
        .hk-bow::before { left: -16px; }
        .hk-bow::after { right: -16px; }

        /* --- Envelope / Opening Stage --- */
        .envelope-container {
            width: 100%;
            max-width: 450px;
            height: 280px;
            background: var(--hk-white);
            border-radius: 15px;
            border: 4px solid var(--hk-pink);
            box-shadow: 0 10px 30px rgba(255, 183, 206, 0.4);
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            overflow: hidden;
        }

        .envelope-container:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(255, 183, 206, 0.6);
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 225px solid transparent;
            border-right: 225px solid transparent;
            border-top: 140px solid var(--hk-pink);
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 5;
        }

        .envelope-container.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-label {
            font-family: var(--font-display);
            font-size: 1.8rem;
            color: var(--hk-dark-pink);
            background: var(--hk-blue);
            padding: 10px 30px;
            border-radius: 30px;
            border: 3px dashed var(--hk-pink);
            z-index: 4;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .envelope-container.open .envelope-label {
            opacity: 0;
        }

        /* --- Letter / Main Content Stage --- */
        .letter-container {
            width: 100%;
            max-width: 500px;
            background: var(--hk-white);
            border-radius: 20px;
            border: 6px solid var(--hk-pink);
            padding: 35px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.05);
            display: none; /* Triggered by JS */
            opacity: 0;
            transform: translateY(50px) scale(0.95);
            transition: opacity 0.8s ease, transform 0.8s ease;
            position: relative;
        }

        .letter-container.show {
            display: block;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Decorative Paper Lines */
        .letter-paper {
            background: linear-gradient(transparent 29px, #F0DDF2 30px);
            background-size: 100% 30px;
            line-height: 30px;
            padding-top: 10px;
        }

        .letter-text {
            font-size: 1.1rem;
            color: var(--hk-text);
            white-space: pre-line; /* Keeps linebreaks intact */
            font-weight: 500;
        }

        /* --- Interactive Hug Section --- */
        .hug-section {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .btn-hug {
            font-family: var(--font-display);
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--hk-dark-pink), var(--hk-pink));
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4);
            transition: all 0.3s ease;
            outline: none;
        }

        .btn-hug:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 133, 162, 0.6);
        }

        .btn-hug:active {
            transform: translateY(1px);
        }

        .hug-display {
            margin-top: 20px;
            background: var(--hk-blue);
            border: 2px dashed var(--hk-pink);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            max-width: 400px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
            display: none;
        }

        .hug-display.active {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        .hug-emoji {
            font-size: 2.5rem;
            margin-bottom: 5px;
            animation: bounce 1.5s infinite;
        }

        /* --- Cute Stationary Decorations --- */
        .decoration-bow {
            position: absolute;
            width: 30px;
            height: 30px;
            background: var(--hk-pink);
            border-radius: 50%;
        }
        .dec-top-right { top: -15px; right: -15px; }
        .dec-bottom-left { bottom: -15px; left: -15px; }

        /* --- Global Animations --- */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* --- Accessibility Feature --- */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        /* --- Responsive Design --- */
        @media (max-width: 480px) {
            .title { font-size: 1.8rem; }
            .envelope-container { height: 200px; }
            .envelope-flap { border-left-width: 170px; border-right-width: 170px; border-top-width: 110px;}
            .envelope-label { font-size: 1.3rem; padding: 8px 20px; }
            .letter-container { padding: 20px; }
            .letter-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <h1 class="sr-only">An uplifting letter from Hello Kitty to Rui</h1>

    <div id="canvas-container">
        <canvas id="particleCanvas"></canvas>
    </div>

    <div class="wrapper">
        <div class="title" aria-hidden="true">Stay Positive Rui! ✨</div>

        <div class="hk-avatar" aria-hidden="true">
            <div class="hk-bow"></div>
            <div class="hk-eyes left"></div>
            <div class="hk-eyes right"></div>
            <div class="hk-nose"></div>
        </div>

        <div class="envelope-container" id="envelope" onclick="openLetter()" role="button" tabindex="0" aria-label="Click to open the letter addressed to Rui">
            <div class="envelope-flap"></div>
            <div class="envelope-label">For Rui 🌸</div>
        </div>

        <main class="letter-container" id="letter">
            <div class="decoration-bow dec-top-right"></div>
            <div class="decoration-bow dec-bottom-left"></div>
            <div class="letter-paper">
                <p class="letter-text" id="typewriter-text" aria-live="polite"></p>
            </div>

            <section class="hug-section">
                <button class="btn-hug" onclick="giveHug()" aria-controls="hug-box">Receive a Hug 💝</button>
                <div class="hug-display" id="hug-box">
                    <div class="hug-emoji">🤗🎀</div>
                    <p id="quote-text" style="font-weight: 700; color: var(--hk-dark-pink);"></p>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- Full Letter Content Definition ---
        const messageContent = `Dear Rui,

No matter what happens, always remember how amazing and strong you are. Every difficult day will pass, and brighter days will come. Believe in yourself, smile often, and never let temporary challenges dim your beautiful light.

You are loved, appreciated, and capable of achieving wonderful things. Keep moving forward one step at a time, and don't forget to be proud of how far you've already come.

Whenever you feel down, remember that there are people cheering for you and wishing you happiness. Stay positive, stay kind to yourself, and keep shining.

With lots of love,
Hello Kitty ❤️`;

        // --- Motivational Hug Quotes ---
        const hugQuotes = [
            "\"You are doing great, Rui! Hello Kitty is super proud of you!\"",
            "\"A warm virtual hug coming your way. You are never alone!\"",
            "\"Take a deep breath. You can handle anything today brings.\"",
            "\"Your potential is endless. Keep shining bright, Rui!\"",
            "\"Remember, you are entirely unique, wonderful, and loved.\""
        ];

        // --- Handle Envelope Opening and Typewriter Trigger ---
        function openLetter() {
            const envelope = document.getElementById('envelope');
            const letter = document.getElementById('letter');
            
            envelope.classList.add('open');
            
            // Generate burst particles on click
            for (let i = 0; i < 20; i++) {
                spawnBurstParticle();
            }

            // Smooth transition from envelope view to letter view
            setTimeout(() => {
                envelope.style.display = 'none';
                letter.classList.add('show');
                startTypewriter();
            }, 800);
        }

        // --- Typewriter Effect Implementation ---
        let index = 0;
        function startTypewriter() {
            const textContainer = document.getElementById('typewriter-text');
            if (index < messageContent.length) {
                textContainer.textContent += messageContent.charAt(index);
                index++;
                // Variables speed to simulate organic typing rhythmic patterns
                let delay = messageContent.charAt(index - 1) === '.' ? 400 : 25;
                setTimeout(startTypewriter, delay);
            }
        }

        // --- Receive a Hug Mechanic ---
        function giveHug() {
            const hugBox = document.getElementById('hug-box');
            const quoteText = document.getElementById('quote-text');
            
            // Randomly select a custom cute quote
            const randomIndex = Math.floor(Math.random() * hugQuotes.length);
            quoteText.textContent = hugQuotes[randomIndex];
            
            // Activate panel display smoothly
            hugBox.classList.add('active');
            
            // Mini burst of pink star particles upon click
            for(let i=0; i<10; i++) {
                spawnBurstParticle();
            }
        }

        // --- HTML5 Canvas Engine: Falling Cherry Blossoms & Floating Hearts ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Particle blueprints
        class Particle {
            constructor(isBurst = false) {
                this.isBurst = isBurst;
                this.x = isBurst ? window.innerWidth / 2 : Math.random() * canvas.width;
                this.y = isBurst ? window.innerHeight / 2 : Math.random() * -canvas.height;
                
                // Color choices: Cherry Blossom Pink, Lavender, White
                const colors = ['#FFB7CE', '#FFE5EC', '#E8DFF5', '#FFFFFF'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                this.size = Math.random() * 6 + 4;
                this.speedX = isBurst ? (Math.random() - 0.5) * 8 : Math.random() * 1 - 0.5;
                this.speedY = isBurst ? (Math.random() - 0.5) * 8 : Math.random() * 1.5 + 1;
                this.opacity = 1;
                this.fade = Math.random() * 0.02 + 0.01;
                this.type = Math.random() > 0.5 ? 'petal' : 'heart';
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                
                if (this.type === 'heart') {
                    // Draw clean procedural vector shapes for hearts
                    ctx.translate(this.x, this.y);
                    ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(-this.size/2, -this.size/2, -this.size, 0, 0, this.size);
                    ctx.bezierCurveTo(this.size, 0, this.size/2, -this.size/2, 0, 0);
                } else {
                    // Draw elegant Sakura cherry blossom petal profiles
                    ctx.translate(this.x, this.y);
                    ctx.ellipse(0, 0, this.size, this.size / 1.5, Math.PI / 4, 0, 2 * Math.PI);
                }
                
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.isBurst) {
                    this.opacity -= this.fade;
                }

                // Recycle passive organic environmental elements falling past screen limit
                if (!this.isBurst && this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                    this.speedY = Math.random() * 1.5 + 1;
                }
            }
        }

        // Initialize steady baseline system components
        function initParticles() {
            for (let i = 0; i < 40; i++) {
                particlesArray.push(new Particle(false));
            }
        }

        // Action-triggered sudden dynamic element generation 
        function spawnBurstParticle() {
            particlesArray.push(new Particle(true));
        }

        // Continuous rendering calculations loop
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                
                // Cleanup faded active bursts instantly to preserve process performance
                if (particlesArray[i].isBurst && particlesArray[i].opacity <= 0) {
                    particlesArray.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateParticles);
        }

        // Engage continuous graphic elements engine execution loop sequences
        initParticles();
        animateParticles();
    </script>
</body>
</html>
